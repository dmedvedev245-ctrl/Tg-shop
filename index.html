let cart = [];
let currentTab = 'phones';
let currentSub = 'all';

function getSubsForTab(tab) {
    const subs = [...new Set(allProducts.filter(p => p.tab === tab).map(p => p.sub))];
    return subs;
}

function setMainTab(tab, btn) {
    currentTab = tab;
    currentSub = 'all';
    document.querySelectorAll('.main-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('search').value = '';

    if (tab === 'services') {
        renderServices();
        document.getElementById('subFilters').innerHTML = '';
        document.getElementById('resultsCount').textContent = '';
    } else {
        renderSubFilters();
        filterProducts();
    }
}

function renderSubFilters() {
    const subs = getSubsForTab(currentTab);
    const container = document.getElementById('subFilters');
    container.innerHTML = '<button class="sub-btn active" onclick="setSub(\'all\',this)">Все</button>' +
        subs.map(s => '<button class="sub-btn" onclick="setSub(\'' + s + '\',this)">' + s + '</button>').join('');
}

function setSub(sub, btn) {
    currentSub = sub;
    document.querySelectorAll('.sub-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    filterProducts();
}

function filterProducts() {
    const query = document.getElementById('search').value.toLowerCase();
    const filtered = allProducts.filter(p => {
        const matchTab = p.tab === currentTab;
        const matchSub = currentSub === 'all' || p.sub === currentSub;
        const matchSearch = p.name.toLowerCase().includes(query);
        return matchTab && matchSub && matchSearch;
    });
    renderProducts(filtered);
}

function renderProducts(list) {
    document.getElementById('resultsCount').textContent = 'Найдено: ' + list.length + ' товаров';
    document.getElementById('catalog').style.display = 'grid';
    document.getElementById('catalog').innerHTML = list.map(p => {
        const priceText = p.inStock && p.price > 0 ? p.price.toLocaleString('ru') + ' ₸' : '';
        return '<div class="card ' + (p.inStock ? '' : 'out-of-stock') + '">' +
            '<img class="card-img" src="' + p.img + '" alt="' + p.name + '" onerror="this.style.display=\'none\'">' +
            '<div class="card-body">' +
            '<div class="card-name">' + p.name + '</div>' +
            (priceText ? '<div class="card-price">' + priceText + '</div>' : '') +
            '<div class="stock-badge ' + (p.inStock ? 'in-stock' : 'no-stock') + '">' + (p.inStock ? '✓ В наличии' : '✗ Нет') + '</div>' +
            '<button class="add-btn" onclick="addToCart(' + p.id + ')" ' + (p.inStock ? '' : 'disabled') + '>' +
            (p.inStock ? 'Заказать' : 'Нет в наличии') + '</button></div></div>';
    }).join('');
}

function renderServices() {
    document.getElementById('catalog').style.display = 'block';
    document.getElementById('catalog').innerHTML = '<div class="services-grid">' +
        services.map(s =>
            '<div class="service-card">' +
            '<div class="service-info">' +
            '<div class="service-name">' + s.icon + ' ' + s.name + '</div>' +
            '<div class="service-desc">' + s.desc + '</div>' +
            '</div>' +
            '<button class="service-btn" onclick="orderService(\'' + s.id + '\')">Записаться</button>' +
            '</div>'
        ).join('') + '</div>';
}

                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({chat_id: '7745794986', text: '🔧 Запрос на услугу!\n\n👤 ' + username + ' (ID: ' + userId + ')\n📋 ' + service.name})
            }).then(function() { tg.showAlert('✅ Запрос отправлен! Менеджер свяжется с вами.'); });
        }
    });
}

function addToCart(id) {
    const product = allProducts.find(p => p.id === id);
    const existing = cart.find(p => p.id === id);
    if (existing) { existing.qty++; } else { cart.push({...product, qty: 1}); }
    updateCartBar();
}

function updateCartBar() {
    const count = cart.reduce((s, p) => s + p.qty, 0);
    document.getElementById('cartCount').textContent = count;
    document.getElementById('cartBar').classList.toggle('visible', count > 0);
}

function openCart() {
    const user = tg.initDataUnsafe && tg.initDataUnsafe.user;
    const username = user ? (user.username ? '@' + user.username : user.first_name) : 'Неизвестный';
    const userId = user ? user.id : 'N/A';
    const text = cart.map(p => '• ' + p.name + (p.price ? ' — ' + p.price.toLocaleString('ru') + ' ₸' : '') + ' x' + p.qty).join('\n');
    tg.showConfirm('Ваш заказ:\n' + text + '\n\nМенеджер подтвердит наличие и цену. Отправить?', function(confirmed) {
        if (confirmed) {
            fetch('https://api.telegram.org/bot8442060752:AAF6D_0k7o2rYX3uL7CgyGrE2NfJrCjUcsw/sendMessage', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({chat_id: '7745794986', text: '🛒 Новый заказ!\n\n👤 ' + username + ' (ID: ' + userId + ')\n\n' + text})
            }).then(function() {
                tg.showAlert('✅ Заказ отправлен! Менеджер свяжется с вами.');
                cart = []; updateCartBar();
            });
        }
    });
}

function filterProducts() {
    const query = document.getElementById('search').value.toLowerCase();
    let list;
    if (query) {
        list = allProducts.filter(p => p.name.toLowerCase().includes(query));
    } else {
        list = allProducts.filter(p => {
            const matchTab = p.tab === currentTab;
            const matchSub = currentSub === 'all' || p.sub === currentSub;
            return matchTab && matchSub;
        });
    }
    renderProducts(list);
}

// Init
renderSubFilters();
filterProducts();
</script>
