<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iPhone Shop</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f2f2f7;
            color: #1c1c1e;
        }

        header {
            background: #fff;
            padding: 16px;
            text-align: center;
            font-size: 20px;
            font-weight: 700;
            border-bottom: 1px solid #e5e5ea;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .search-bar {
            padding: 12px 16px;
            background: #fff;
            border-bottom: 1px solid #e5e5ea;
        }

        .search-bar input {
            width: 100%;
            padding: 10px 14px;
            border-radius: 10px;
            border: none;
            background: #f2f2f7;
            font-size: 15px;
            outline: none;
        }

        .filters {
            display: flex;
            gap: 8px;
            padding: 12px 16px;
            overflow-x: auto;
            background: #fff;
            border-bottom: 1px solid #e5e5ea;
        }

        .filter-btn {
            padding: 6px 16px;
            border-radius: 20px;
            border: 1.5px solid #e5e5ea;
            background: #fff;
            font-size: 14px;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-btn.active {
            background: #007aff;
            color: #fff;
            border-color: #007aff;
        }

        .catalog {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            padding: 16px;
        }

        .card {
            background: #fff;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
        }

        .card img {
            width: 100%;
            height: 160px;
            object-fit: contain;
            padding: 12px;
            background: #f9f9f9;
        }

        .card-info {
            padding: 12px;
        }

        .card-name {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .card-price {
            font-size: 16px;
            font-weight: 700;
            color: #007aff;
            margin-bottom: 10px;
        }

        .add-btn {
            width: 100%;
            padding: 8px;
            background: #007aff;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .add-btn:active { opacity: 0.7; }

        .cart-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #007aff;
            color: #fff;
            padding: 14px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transform: translateY(100%);
            transition: transform 0.3s;
        }

        .cart-bar.visible {
            transform: translateY(0);
        }
    </style>
</head>
<body>

<header>📱 iPhone Shop</header>

<div class="search-bar">
    <input type="text" id="search" placeholder="Поиск телефона..." oninput="filterProducts()">
</div>

<div class="filters">
    <button class="filter-btn active" onclick="setFilter('all', this)">Все</button>
    <button class="filter-btn" onclick="setFilter('iphone', this)">iPhone</button>
    <button class="filter-btn" onclick="setFilter('android', this)">Android</button>
</div>

<div class="catalog" id="catalog"></div>

<div class="cart-bar" id="cartBar" onclick="openCart()">
    <span>🛒 Корзина (<span id="cartCount">0</span>)</span>
    <span id="cartTotal">0 ₽</span>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const products = [
        { id: 1, name: "iPhone 15 Pro", price: 119990, category: "iphone", img: "https://store.storeimages.cdn-apple.com/4668/as-images.apple.com/is/iphone-15-pro-finish-select-202309-6-1inch_GEO_EMEA?wid=300&hei=300&fmt=jpeg" },
        { id: 2, name: "iPhone 15", price: 89990, category: "iphone", img: "https://store.storeimages.cdn-apple.com/4668/as-images.apple.com/is/iphone-15-finish-select-202309-6-1inch-blue?wid=300&hei=300&fmt=jpeg" },
        { id: 3, name: "iPhone 14", price: 74990, category: "iphone", img: "https://store.storeimages.cdn-apple.com/4668/as-images.apple.com/is/iphone-14-finish-select-202209-6-1inch-blue?wid=300&hei=300&fmt=jpeg" },
        { id: 4, name: "Samsung Galaxy S24", price: 79990, category: "android", img: "https://images.samsung.com/is/image/samsung/p6pim/levant/2401/gallery/levant-galaxy-s24-s921-sm-s921bzadeub-thumb-539512648?wid=300&hei=300" },
        { id: 5, name: "Samsung Galaxy A55", price: 39990, category: "android", img: "https://images.samsung.com/is/image/samsung/p6pim/ru/sm-a556ezaacau/gallery/ru-galaxy-a55-5g-sm-a556-sm-a556ezaacau-thumb-539860999?wid=300&hei=300" },
        { id: 6, name: "Xiaomi 14", price: 59990, category: "android", img: "https://i01.appmifile.com/webfile/globalimg/products/pc/xiaomi-14/overview-kv.png" },
    ];

    let cart = [];
    let currentFilter = 'all';

    function renderProducts(list) {
        const catalog = document.getElementById('catalog');
        catalog.innerHTML = list.map(p => `
            <div class="card">
                <img src="${p.img}" alt="${p.name}" onerror="this.src='https://via.placeholder.com/150'">
                <div class="card-info">
                    <div class="card-name">${p.name}</div>
                    <div class="card-price">${p.price.toLocaleString()} ₽</div>
                    <button class="add-btn" onclick="addToCart(${p.id})">В корзину</button>
                </div>
            </div>
        `).join('');
    }

    function filterProducts() {
        const query = document.getElementById('search').value.toLowerCase();
        const filtered = products.filter(p => {
            const matchFilter = currentFilter === 'all' || p.category === currentFilter;
            const matchSearch = p.name.toLowerCase().includes(query);
            return matchFilter && matchSearch;
        });
        renderProducts(filtered);
    }

    function setFilter(filter, btn) {
        currentFilter = filter;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        filterProducts();
    }

    function addToCart(id) {
        const product = products.find(p => p.id === id);
        const existing = cart.find(p => p.id === id);
        if (existing) {
            existing.qty++;
        } else {
            cart.push({ ...product, qty: 1 });
        }
        updateCartBar();
    }

    function updateCartBar() {
        const count = cart.reduce((s, p) => s + p.qty, 0);
        const total = cart.reduce((s, p) => s + p.price * p.qty, 0);
        document.getElementById('cartCount').textContent = count;
        document.getElementById('cartTotal').textContent = total.toLocaleString() + ' ₽';
        const bar = document.getElementById('cartBar');
        bar.classList.toggle('visible', count > 0);
    }

    function openCart() {
        const text = cart.map(p => `${p.name} x${p.qty} — ${(p.price * p.qty).toLocaleString()} ₽`).join('\n');
        const total = cart.reduce((s, p) => s + p.price * p.qty, 0);
        tg.showConfirm(
            `Ваш заказ:\n${text}\n\nИтого: ${total.toLocaleString()} ₽\n\nОтправить менеджеру?`,
            (confirmed) => {
                if (confirmed) {
                    tg.sendData(JSON.stringify({ order: cart, total }));
                }
            }
        );
    }

    renderProducts(products);
</script>

</body>
</html>
