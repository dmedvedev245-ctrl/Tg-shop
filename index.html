        .card {

            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);

            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            margin-top: auto;

let cart = [];
let currentFilter = 'all';

function renderProducts(list) {
    const catalog = document.getElementById('catalog');
    document.getElementById('resultsCount').textContent = 'Найдено: ' + list.length + ' товаров';
    catalog.innerHTML = list.map(p => {
        const specsHtml = Object.values(p.specs).map(v => '<span>' + v + '</span>').join('');
        const img = imgs[p.category] || '';
        return '<div class="card ' + (p.inStock ? '' : 'out-of-stock') + '">' +
            '<img class="card-img" src="' + img + '" alt="' + p.name + '" onerror="this.style.display=\'none\'">' +
            '<div class="card-body">' +
            '<div class="card-name">' + p.name + '</div>' +
            '<div class="stock-badge ' + (p.inStock ? 'in-stock' : 'no-stock') + '">' + (p.inStock ? '✓ В наличии' : '✗ Нет') + '</div>' +
            '<div class="card-specs">' + specsHtml + '</div>' +
            '<button class="add-btn" onclick="addToCart(' + p.id + ')" ' + (p.inStock ? '' : 'disabled') + '>' +
            (p.inStock ? 'Заказать' : 'Нет в наличии') +
            '</button></div></div>';
    }).join('');
}

function filterProducts() {
    const query = document.getElementById('search').value.toLowerCase();
    const filtered = products.filter(p => {
        const matchFilter = currentFilter === 'all' || p.category === currentFilter;
        const matchSearch = p.name.toLowerCase().includes(query);
        return matchFilter && matchSearch;
    });
    renderProducts(filtered);
}

function setFilter(filter, btn) {
    currentFilter = filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    filterProducts();
}

function addToCart(id) {
    const product = products.find(p => p.id === id);
    const existing = cart.find(p => p.id === id);
    if (existing) { existing.qty++; } else { cart.push({...product, qty: 1}); }
    updateCartBar();
}

function updateCartBar() {
    const count = cart.reduce((s, p) => s + p.qty, 0);
    document.getElementById('cartCount').textContent = count;
    document.getElementById('cartBar').classList.toggle('visible', count > 0);
}

function openCart() {
    const user = tg.initDataUnsafe && tg.initDataUnsafe.user;
    const username = user ? (user.username ? '@' + user.username : user.first_name) : 'Неизвестный';
    const userId = user ? user.id : 'N/A';
    const text = cart.map(p => '• ' + p.name + ' x' + p.qty).join('\n');
    tg.showConfirm('Ваш запрос:\n' + text + '\n\nМенеджер свяжется и сообщит цену. Подтвердить?', function(confirmed) {
        if (confirmed) {
            const message = '🛒 Новый запрос!\n\n👤 ' + username + ' (ID: ' + userId + ')\n\n' + text;
            fetch('https://api.telegram.org/bot8442060752:AAF6D_0k7o2rYX3uL7CgyGrE2NfJrCjUcsw/sendMessage', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({chat_id: '7745794986', text: message})
            }).then(function() {
                tg.showAlert('✅ Запрос отправлен! Менеджер свяжется с вами.');
                cart = [];
                updateCartBar();
            });
        }
    });
}

renderProducts(products);
