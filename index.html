<script>
const tg = window.Telegram.WebApp;
tg.expand();

const CLOUD_NAME = 'dxzccbrb1';
const UPLOAD_PRESET = 'store457';
const ADMIN_PASSWORD = '457admin';
const BOT_TOKEN = '8442060752:AAF6D_0k7o2rYX3uL7CgyGrE2NfJrCjUcsw';
const MANAGER_ID = '7745794986';
const NPOINT_URL = 'https://api.npoint.io/161616576b21c39fda33';

let isAdmin = false;
let editingProductId = null;
let cart = [];
let currentTab = 'phones';
let currentSub = 'all';
let tapCount = 0, tapTimer;
let customPhotos = {};
let stockOverrides = JSON.parse(localStorage.getItem('store457_stock') || '{}');

fetch(NPOINT_URL + '?t=' + Date.now())
  .then(r => r.json())
  .then(data => {
    customPhotos = {...(data||{})};
    if (customPhotos._banners) { banners = customPhotos._banners; delete customPhotos._banners; }
    renderBanner(); filterProducts();
  }).catch(() => { renderBanner(); });

document.getElementById('headerTitle').addEventListener('click', () => {
  tapCount++;
  clearTimeout(tapTimer);
  tapTimer = setTimeout(() => tapCount = 0, 1000);
  if (tapCount >= 3) { tapCount = 0; if (!isAdmin) showAdminLogin(); }
});

function showAdminLogin() {
  const el = document.createElement('div');
  el.className = 'admin-login'; el.id = 'adminLogin';
  el.innerHTML = '<div class="admin-login-box"><h3>🔐 Администратор</h3><input type="password" id="adminPass" placeholder="Пароль"><button class="ok-btn" onclick="checkAdminPass()">Войти</button><button class="cancel-btn" onclick="closeAdminLogin()">Отмена</button></div>';
  document.body.appendChild(el);
  setTimeout(() => document.getElementById('adminPass').focus(), 100);
}
function checkAdminPass() {
  if (document.getElementById('adminPass').value === ADMIN_PASSWORD) {
    isAdmin = true;
    document.body.classList.add('admin-mode');
    document.getElementById('adminBar').classList.add('show');
    closeAdminLogin();
    filterProducts();
    renderBanner();
  } else { alert('Неверный пароль!'); }
}
function closeAdminLogin() { const el = document.getElementById('adminLogin'); if (el) el.remove(); }
function exitAdmin() {
  isAdmin = false;
  document.body.classList.remove('admin-mode');
  document.getElementById('adminBar').classList.remove('show');
  filterProducts();
  renderBanner();
}

function toggleStock(productId) {
  const p = allProducts.find(x => x.id === productId);
  const current = stockOverrides.hasOwnProperty(productId) ? stockOverrides[productId] : p.inStock;
  stockOverrides[productId] = !current;
  localStorage.setItem('store457_stock', JSON.stringify(stockOverrides));
  filterProducts();
}

function openUpload(productId) {
  editingProductId = productId;
  const p = allProducts.find(x => x.id === productId);
  const hasCustom = customPhotos[productId] || customPhotos[String(productId)];
  const el = document.createElement('div');
  el.className = 'upload-overlay'; el.id = 'uploadOverlay';
  el.innerHTML = '<div class="upload-box">' +
    '<h3>📸 Управление фото</h3>' +
    '<p>' + p.name + '</p>' +
    '<input type="file" id="photoFile" accept="image/*" style="display:none" onchange="uploadPhoto()">' +
    '<button class="up-btn" onclick="document.getElementById(\'photoFile\').removeAttribute(\'capture\');document.getElementById(\'photoFile\').click()">🖼 Галерея</button>' +
    '<button class="up-btn" style="background:#444" onclick="document.getElementById(\'photoFile\').setAttribute(\'capture\',\'environment\');document.getElementById(\'photoFile\').click()">📷 Камера</button>' +
    (hasCustom ? '<button class="up-btn" style="background:#c62828" onclick="deletePhoto(' + productId + ')">🗑 Удалить фото</button>' : '') +
    '<button class="up-cancel" style="margin-top:4px" onclick="closeUpload()">Отмена</button>' +
    '<div class="upload-progress" id="uploadProgress"></div>' +
    '</div>';
  document.body.appendChild(el);
}
function closeUpload() { const el = document.getElementById('uploadOverlay'); if (el) el.remove(); editingProductId = null; }
function uploadPhoto() {
  const file = document.getElementById('photoFile').files[0];
  if (!file) return;

function clearSearch() {
  document.getElementById('search').value='';
  document.getElementById('clearBtn').style.display='none';
  renderSubFilters(); filterProducts();
}
function getBaseModel(name) {
  return name.replace(/\s+\d+\/\d+.*$/, '').replace(/\s+\d+(Gb|Tb).*$/i, '').trim();
}
function openProductCard(baseModel) {
  const variants = allProducts.filter(p => getBaseModel(p.name) === baseModel);
  if (!variants.length) return;
  const memSet = new Set();
  variants.forEach(p => { const m = p.name.match(/(\d+\/\d+|\d+(?:Gb|Tb))/i); if(m) memSet.add(m[1]); });
  const mems = [...memSet];
  const simSet = new Set();
  variants.forEach(p => { const m = p.name.match(/\((eSIM\+SIM|eSIM)\)/i); if(m) simSet.add(m[1]); });
  const sims = [...simSet];
  const varSet = new Set();
  variants.forEach(p => { const after = p.name.replace(baseModel,'').replace(/\s+\d+\/\d+\s*/,'').replace(/\s+\d+(?:Gb|Tb)\s*/i,'').replace(/\s*\(eSIM\+SIM\)|\s*\(eSIM\)/gi,'').trim(); if(after) varSet.add(after); });
  const varOpts = [...varSet];
  const first = variants.find(p => stockOverrides.hasOwnProperty(p.id)?stockOverrides[p.id]:p.inStock) || variants[0];
  const el = document.createElement('div');
  el.className = 'cart-overlay'; el.id = 'productCardOverlay';
  el.innerHTML = '<div class="cart-sheet" style="max-height:90vh">' +
    '<div style="width:40px;height:4px;background:#e0e0e0;border-radius:2px;margin:0 auto 16px"></div>' +
    '<div id="pcImgWrap" style="width:100%;height:240px;overflow:hidden;border-radius:16px;background:#f5f5f7;display:flex;align-items:center;justify-content:center;margin-bottom:16px">' +
    '<img id="pcImg" src="'+getProductImage(first)+'" style="max-width:100%;max-height:100%;object-fit:contain;touch-action:pinch-zoom"></div>' +
    '<div style="font-size:18px;font-weight:700;margin-bottom:16px;text-align:center">'+baseModel+'</div>' +
    (mems.length>1?'<div style="margin-bottom:12px"><div style="font-size:13px;font-weight:600;color:#86868b;margin-bottom:8px">Память</div><div style="display:flex;flex-wrap:wrap;gap:8px" id="memOptions">'+mems.map((m,i)=>'<button onclick="selectMem(\''+baseModel+'\',\''+m+'\')" class="var-chip'+(i===0?' active':'')+'" data-mem="'+m+'">'+m+'</button>').join('')+'</div></div>':'') +
    (sims.length>1?'<div style="margin-bottom:12px"><div style="font-size:13px;font-weight:600;color:#86868b;margin-bottom:8px">SIM</div><div style="display:flex;flex-wrap:wrap;gap:8px" id="simOptions">'+sims.map((s,i)=>'<button onclick="selectSim(\''+baseModel+'\',\''+s+'\')" class="var-chip'+(i===0?' active':'')+'" data-sim="'+s+'">'+s+'</button>').join('')+'</div></div>':'') +
(varOpts.length>1?'<div style="margin-bottom:16px"><div style="font-size:13px;font-weight:600;color:#86868b;margin-bottom:8px">Вариант</div><div style="display:flex;flex-wrap:wrap;gap:8px" id="varOptions">'+varOpts.map((v,i)=>'<button onclick="selectVar(\''+baseModel+'\',\''+v+'\')" class="var-chip'+(i===0?' active':'')+'" data-var="'+v+'">'+v+'</button>').join('')+'</div></div>':'') +
    '<div id="pcStatus" style="margin-bottom:8px"></div>' +
    '<div style="font-size:11px;color:#86868b;margin-bottom:12px;text-align:center">💬 Цена по запросу у менеджера</div>' +
    '<button id="pcOrderBtn" class="cart-send" onclick="addToCartFromCard(\''+baseModel+'\')">Заказать</button>' +
    '<button class="cart-close" onclick="closeProductCard()">Закрыть</button>' +
    '</div>';
  document.body.appendChild(el);
  window._selMem = mems[0]||null;
  window._selSim = sims[0]||null;
  window._selVar = varOpts[0]||null;
  updateCardStatus(baseModel);
}
function closeProductCard() { const el=document.getElementById('productCardOverlay'); if(el)el.remove(); window._selMem=null; window._selVar=null; }
function selectMem(baseModel,mem) {
  window._selMem=mem;
  document.querySelectorAll('#memOptions .var-chip').forEach(b=>b.classList.toggle('active',b.dataset.mem===mem));
  updateCardStatus(baseModel);
}
function selectSim(baseModel,sim) {
  window._selSim=sim;
  document.querySelectorAll('#simOptions .var-chip').forEach(b=>b.classList.toggle('active',b.dataset.sim===sim));
  updateCardStatus(baseModel);
}
function selectVar(baseModel,v) {
  window._selVar=v;
  document.querySelectorAll('#varOptions .var-chip').forEach(b=>b.classList.toggle('active',b.dataset.var===v));
  updateCardStatus(baseModel);
}
function getSelectedProduct(baseModel) {
  let filtered=allProducts.filter(p=>getBaseModel(p.name)===baseModel);
  if(window._selMem) filtered=filtered.filter(p=>p.name.includes(window._selMem));
  if(window._selSim) filtered=filtered.filter(p=>p.name.includes(window._selSim));
  if(window._selVar) filtered=filtered.filter(p=>p.name.includes(window._selVar));
  return filtered[0]||allProducts.find(p=>getBaseModel(p.name)===baseModel);
}
function updateCardStatus(baseModel) {
  const p=getSelectedProduct(baseModel); if(!p) return;
  const remaining=allProducts.filter(x=>getBaseModel(x.name)===baseModel);
  // Обновляем доступные чипы памяти
  document.querySelectorAll('#memOptions .var-chip').forEach(b=>{
    const m=b.dataset.mem;
    const exists=remaining.filter(x=>x.name.includes(m)&&(!window._selSim||x.name.includes(window._selSim))&&(!window._selVar||x.name.includes(window._selVar))).length>0;
    b.style.opacity=exists?'1':'0.35'; b.style.pointerEvents=exists?'':'none';
  });
  // Обновляем доступные чипы SIM
  document.querySelectorAll('#simOptions .var-chip').forEach(b=>{
    const s=b.dataset.sim;
    const exists=remaining.filter(x=>x.name.includes(s)&&(!window._selMem||x.name.includes(window._selMem))&&(!window._selVar||x.name.includes(window._selVar))).length>0;
    b.style.opacity=exists?'1':'0.35'; b.style.pointerEvents=exists?'':'none';
  });
  // Обновляем доступные чипы цвета
  document.querySelectorAll('#varOptions .var-chip').forEach(b=>{
    const v=b.dataset.var;
    const exists=remaining.filter(x=>x.name.includes(v)&&(!window._selMem||x.name.includes(window._selMem))&&(!window._selSim||x.name.includes(window._selSim))).length>0;
    b.style.opacity=exists?'1':'0.35'; b.style.pointerEvents=exists?'':'none';
  });
  const inStock=stockOverrides.hasOwnProperty(p.id)?stockOverrides[p.id]:p.inStock;
  const s=document.getElementById('pcStatus'); const b=document.getElementById('pcOrderBtn');
  if(s) s.innerHTML='<span class="stock-badge '+(inStock?'in-stock':'no-stock')+'">'+(inStock?'✓ В наличии':'✗ Нет в наличии')+'</span>';
  if(b){b.disabled=!inStock;b.style.background=inStock?'#1d1d1f':'#c7c7cc';}
  const img=document.getElementById('pcImg'); if(img) img.src=getProductImage(p);
}
function addToCartFromCard(baseModel) {
  const p=getSelectedProduct(baseModel); if(!p) return;
  const inStock=stockOverrides.hasOwnProperty(p.id)?stockOverrides[p.id]:p.inStock;
  if(!inStock) return;
  addToCart(p.id); closeProductCard();
  tg.showAlert('✅ '+p.name+'\nДобавлен в корзину!');
}
function getSubsForTab(tab) { return [...new Set(allProducts.filter(p=>p.tab===tab).map(p=>p.sub))]; }
function renderSubFilters() {
  const subs = getSubsForTab(currentTab);
  document.getElementById('subFilters').innerHTML =
    '<button class="sub-btn active" onclick="setSub(\'all\',this)">Все</button>' +
    subs.map(s=>'<button class="sub-btn" onclick="setSub(\''+s+'\',this)">'+s+'</button>').join('');
}
function setSub(sub,btn) {
  currentSub=sub;
  document.querySelectorAll('.sub-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  filterProducts();
}
function filterProducts() {
  const q = document.getElementById('search').value.toLowerCase();
  const clearBtn = document.getElementById('clearBtn');
  if(clearBtn) clearBtn.style.display = q ? 'block' : 'none';
  let list = q ? allProducts.filter(p=>p.name.toLowerCase().includes(q)) : allProducts.filter(p=>p.tab===currentTab&&(currentSub==='all'||p.sub===currentSub));
  const tabOrder = {phones:0,tablets:1,laptops:2,watches:3,headphones:4,speakers:5,accessories:6,vacuum:7,gaming:8,cameras:9,rugged:10};
const subOrder = {'Apple':0,'Samsung':1,'Xiaomi':2,'Google':3,'Honor':4,'OnePlus':5,'Другие':6};
list = list.slice().sort((a,b)=>{
  if(a.tab!==b.tab) return (tabOrder[a.tab]||9)-(tabOrder[b.tab]||9);
if(a.sub!==b.sub) return (subOrder[a.sub]??9)-(subOrder[b.sub]??9);  const sa=getModelScore(a.name),sb=getModelScore(b.name);
  if(sb!==sa)return sb-sa;
  return getStorageMB(a.name)-getStorageMB(b.name);
});
  renderProducts(list);
}
function renderProducts(list) {
  const q = document.getElementById('search').value;
  document.getElementById('resultsCount').textContent='Найдено: '+list.length+' товаров';
  document.getElementById('catalog').style.display='grid';
  const groups={};
  list.forEach(p=>{ const base=getBaseModel(p.name); if(!groups[base])groups[base]=[]; groups[base].push(p); });
  document.getElementById('catalog').innerHTML=Object.entries(groups).map(([base,variants])=>{
    const first=variants.find(p=>stockOverrides.hasOwnProperty(p.id)?stockOverrides[p.id]:p.inStock)||variants[0];
    const inStock=variants.some(p=>stockOverrides.hasOwnProperty(p.id)?stockOverrides[p.id]:p.inStock);
    const src=getProductImage(first);
    const stockColor=inStock?'rgba(46,125,50,0.85)':'rgba(198,40,40,0.85)';
    const safeBase=base.replace(/'/g,"\\'");
    return '<div class="card '+(inStock?'':'out-of-stock')+'" onclick="openProductCard(\''+safeBase+'\')" style="cursor:pointer">' +
      '<button class="stock-btn" style="background:'+stockColor+'" onclick="event.stopPropagation();toggleStock('+first.id+')">'+(inStock?'✓ Есть':'✗ Нет')+'</button>' +
      '<button class="edit-btn" onclick="event.stopPropagation();openUpload('+first.id+')">✏️ Фото</button>' +
      '<img class="card-img" src="'+src+'" alt="'+base+'" onerror="this.style.display=\'none\'">' +
      '<div class="card-body">' +
      '<div class="card-name">'+base+'</div>' +
      (q?'<div style="font-size:10px;color:#86868b;margin-bottom:2px">'+(catNames[first.tab]||'')+'</div>':'') +
      (variants.length>1?'<div style="font-size:10px;color:#0071e3;margin-bottom:4px">'+variants.length+' вариантов →</div>':'') +
      '<div class="stock-badge '+(inStock?'in-stock':'no-stock')+'">'+(inStock?'✓ В наличии':'✗ Нет')+'</div>' +
      '<div style="font-size:11px;color:#86868b;margin-bottom:4px;margin-top:auto">💬 Цена по запросу</div>' +
      '<div style="display:flex;gap:6px">' +
      '<button class="add-btn" style="flex:1" onclick="event.stopPropagation();openProductCard(\''+safeBase+'\')" '+(inStock?'':'disabled')+'>Выбрать</button>' +
      '<button onclick="event.stopPropagation();shareProduct('+first.id+')" style="padding:8px 10px;background:#f5f5f7;border:none;border-radius:10px;font-size:16px;cursor:pointer">📤</button>' +
      '</div></div></div>';
  }).join('');
}
function renderServices() {
  document.getElementById('catalog').style.display='block';
  document.getElementById('catalog').innerHTML='<div class="services-grid">'+
    services.map(s=>'<div class="service-card"><div class="service-info"><div class="service-name">'+s.icon+' '+s.name+'</div><div class="service-desc">'+s.desc+'</div></div><button class="service-btn" onclick="orderService(\''+s.id+'\')">Записаться</button></div>').join('')+'</div>';
}

function addToCart(id) {
  const p=allProducts.find(x=>x.id===id);
  const ex=cart.find(x=>x.id===id);
  if(ex)ex.qty++; else cart.push({...p,qty:1});
  updateCartBar();
}
function updateCartBar() {
  const count=cart.reduce((s,p)=>s+p.qty,0);
  document.getElementById('cartCount').textContent=count;
  document.getElementById('cartBar').classList.toggle('visible',count>0);
}
function openCart() {
  const el=document.createElement('div');
  el.className='cart-overlay'; el.id='cartOverlay';
  el.innerHTML='<div class="cart-sheet"><h2>🛒 Корзина</h2><div id="cartItems"></div><div class="cart-total" id="cartTotal"></div><button class="cart-send" onclick="sendCart()">Отправить заказ менеджеру</button><button class="cart-close" onclick="closeCart()">Закрыть</button></div>';
  document.body.appendChild(el);
  renderCart();
}
function closeCart() { const el=document.getElementById('cartOverlay'); if(el)el.remove(); }
function renderCart() {
  const el=document.getElementById('cartItems'); if(!el)return;
  if(cart.length===0){el.innerHTML='<div style="text-align:center;padding:30px;color:#86868b">Корзина пуста</div>';document.getElementById('cartTotal').textContent='';return;}
  el.innerHTML=cart.map(p=>'<div class="cart-item"><div class="cart-item-name">'+p.name+'</div><div class="cart-qty"><button onclick="changeQty('+p.id+',-1)">−</button><span>'+p.qty+'</span><button onclick="changeQty('+p.id+',1)">+</button></div><button class="cart-del" onclick="removeFromCart('+p.id+')">🗑</button></div>').join('');
  document.getElementById('cartTotal').textContent='Товаров: '+cart.reduce((s,p)=>s+p.qty,0)+' шт.';
}
function changeQty(id,delta) {
  const item=cart.find(x=>x.id===id); if(!item)return;
  item.qty+=delta;
  if(item.qty<=0)cart=cart.filter(x=>x.id!==id);
  updateCartBar(); renderCart();
}
function removeFromCart(id) { cart=cart.filter(x=>x.id!==id); updateCartBar(); renderCart(); }
function sendCart() {
  if(cart.length===0)return;
  const user=tg.initDataUnsafe&&tg.initDataUnsafe.user;
  const username=user?(user.username?'@'+user.username:user.first_name):'Неизвестный';
  const userId=user?user.id:'N/A';
  const text=cart.map(p=>'• '+p.name+' x'+p.qty).join('\n');
  fetch('https://api.telegram.org/bot'+BOT_TOKEN+'/sendMessage',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({chat_id:MANAGER_ID,text:'🛒 Новый заказ!\n\n👤 '+username+' (ID: '+userId+')\n\n'+text})})
    .then(()=>{tg.showAlert('✅ Заказ отправлен!');cart=[];updateCartBar();closeCart();});
}
function shareProduct(id) {
  const p = allProducts.find(x => x.id === id);
  const text = '🛍 ' + p.name + '\n\nСмотри в магазине STORE 457!\n👉 https://t.me/Store_457_bot';
  if (navigator.share) {
    navigator.share({ title: p.name, text: text });
  } else {
    const url = 'https://t.me/share/url?url=https://t.me/Store_457_bot&text=' + encodeURIComponent(text);
    window.open(url, '_blank');
  }
}
function orderService(id) {
  const s=services.find(x=>x.id===id);
  const user=tg.initDataUnsafe&&tg.initDataUnsafe.user;
  const username=user?(user.username?'@'+user.username:user.first_name):'Неизвестный';
  const userId=user?user.id:'N/A';
  tg.showConfirm('Записаться на:\n'+s.name+'\nМенеджер свяжется. Подтвердить?',function(ok){
    if(ok)fetch('https://api.telegram.org/bot'+BOT_TOKEN+'/sendMessage',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({chat_id:MANAGER_ID,text:'🔧 Запрос!\n\n👤 '+username+' (ID: '+userId+')\n📋 '+s.name})}).then(()=>{tg.showAlert('✅ Запрос отправлен!');});
  });
}

let currentSlide = 0;
let bannerTimer;
let banners = [
  {img:'https://dmedvedev245-ctrl.github.io/Tg-shop/iphone-17-pro-17-pro-max-hero.png',bg:'#1d1d1f',tag:'🔥 SALE',tagColor:'#ff3b30',title:'iPhone 17 Pro Max — лучшая цена'},
  {img:'https://images.samsung.com/is/image/samsung/p6pim/levant/2501/gallery/levant-galaxy-s25-s931-sm-s931bzadeub-thumb-544547466?$650_519_PNG$',bg:'#0071e3',tag:'⭐ ХИТ ПРОДАЖ',tagColor:'#ff9500',title:'Samsung S25 Ultra — в наличии'},
  {img:'https://store.storeimages.cdn-apple.com/4668/as-images.apple.com/is/airpods-pro-2-hero-select-202409?wid=400&hei=400&fmt=jpeg',bg:'#f5f5f7',tag:'✨ НОВИНКА',tagColor:'#34c759',title:'AirPods Pro 3 — только что в продаже'},
  {img:'https://store.storeimages.cdn-apple.com/4668/as-images.apple.com/is/mbp14-spaceblack-select-202310?wid=400&hei=400&fmt=jpeg',bg:'#1d1d1f',tag:'💻 АКТУАЛЬНО',tagColor:'#0071e3',title:'MacBook Pro M5 — свежее поступление'},
];

function renderBanner() {
  const track = document.getElementById('bannerTrack');
  const dots = document.getElementById('bannerDots');
  const addBtn = document.getElementById('addSlideBtn');
  if (!track) return;
  track.innerHTML = banners.map((b,i) =>
    '<div class="banner-slide" style="background:'+b.bg+'">' +
    '<img src="'+b.img+'" style="width:100%;height:100%;object-fit:cover">' +
    '<div class="banner-label">' +
    '<span class="banner-tag" style="background:'+b.tagColor+'">'+b.tag+'</span>' +
    '<span class="banner-title">'+b.title+'</span></div>' +
    (isAdmin ? '<button onclick="editBannerSlide('+i+')" style="position:absolute;top:8px;right:8px;background:rgba(0,0,0,0.6);color:#fff;border:none;border-radius:8px;padding:4px 10px;font-size:12px;cursor:pointer">✏️ Изменить</button>' +
    '<button onclick="deleteBannerSlide('+i+')" style="position:absolute;top:8px;left:8px;background:rgba(198,40,40,0.8);color:#fff;border:none;border-radius:8px;padding:4px 10px;font-size:12px;cursor:pointer">🗑</button>' : '') +
    '</div>'
  ).join('');
  dots.innerHTML = banners.map((_,i) => '<div class="banner-dot'+(i===0?' active':'')+'" onclick="goSlide('+i+')"></div>').join('');
  if (addBtn) addBtn.style.display = isAdmin ? 'block' : 'none';
  goSlide(0);
  clearInterval(bannerTimer);
  bannerTimer = setInterval(() => goSlide((currentSlide+1)%banners.length), 3500);
  const bw = document.getElementById('bannerWrap');
  let bStartX = 0;
  bw.ontouchstart = e => bStartX = e.touches[0].clientX;
  bw.ontouchend = e => { const diff = bStartX - e.changedTouches[0].clientX; if(Math.abs(diff)>40) goSlide(diff>0?(currentSlide+1)%banners.length:(currentSlide-1+banners.length)%banners.length); };
}

function goSlide(n) {
  currentSlide = n;
  const track = document.getElementById('bannerTrack');
  if (track) track.style.transform = 'translateX(-'+(n*100)+'%)';
  document.querySelectorAll('.banner-dot').forEach((d,i) => d.classList.toggle('active', i===n));
}

function saveBanners(cb) {
  fetch(NPOINT_URL, {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({...customPhotos, _banners: banners})}).then(()=>{ if(cb)cb(); });
}

function editBannerSlide(i) {
  const b = banners[i];
  const el = document.createElement('div');
  el.className = 'upload-overlay'; el.id = 'bannerEditOverlay';
  el.innerHTML = '<div class="upload-box" style="width:320px">' +
    '<h3>✏️ Редактировать слайд</h3>' +
    '<p style="margin-top:8px;margin-bottom:4px;font-size:12px;font-weight:600">Картинка (URL)</p>' +
    '<input id="be_img" value="'+b.img+'" style="width:100%;padding:8px;border-radius:8px;border:1px solid #e0e0e0;font-size:12px;margin-bottom:8px">' +
    '<p style="margin-bottom:4px;font-size:12px;font-weight:600">Цвет фона</p>' +
    '<input id="be_bg" value="'+b.bg+'" style="width:100%;padding:8px;border-radius:8px;border:1px solid #e0e0e0;font-size:12px;margin-bottom:8px">' +
    '<p style="margin-bottom:4px;font-size:12px;font-weight:600">Метка (тег)</p>' +
    '<input id="be_tag" value="'+b.tag+'" style="width:100%;padding:8px;border-radius:8px;border:1px solid #e0e0e0;font-size:12px;margin-bottom:8px">' +
    '<p style="margin-bottom:4px;font-size:12px;font-weight:600">Цвет метки</p>' +
    '<input id="be_tagColor" value="'+b.tagColor+'" style="width:100%;padding:8px;border-radius:8px;border:1px solid #e0e0e0;font-size:12px;margin-bottom:8px">' +
    '<p style="margin-bottom:4px;font-size:12px;font-weight:600">Заголовок</p>' +
    '<input id="be_title" value="'+b.title+'" style="width:100%;padding:8px;border-radius:8px;border:1px solid #e0e0e0;font-size:12px;margin-bottom:12px">' +
    '<button class="up-btn" onclick="saveBannerSlide('+i+')">💾 Сохранить</button>' +
    '<button class="up-cancel" onclick="closeBannerEdit()">Отмена</button>' +
    '<div id="bannerSaveStatus" class="upload-progress"></div>' +
    '</div>';
  document.body.appendChild(el);
}

function saveBannerSlide(i) {
  banners[i] = {
    img: document.getElementById('be_img').value,
    bg: document.getElementById('be_bg').value,
    tag: document.getElementById('be_tag').value,
    tagColor: document.getElementById('be_tagColor').value,
    title: document.getElementById('be_title').value,
  };
  document.getElementById('bannerSaveStatus').textContent = '⏳ Сохраняю...';
  saveBanners(() => { closeBannerEdit(); renderBanner(); tg.showAlert('✅ Слайд обновлён!'); });
}

function closeBannerEdit() { const el=document.getElementById('bannerEditOverlay'); if(el)el.remove(); }

function addBannerSlide() {
  banners.push({img:'https://dmedvedev245-ctrl.github.io/Tg-shop/iphone-17-pro-17-pro-max-hero.png',bg:'#1d1d1f',tag:'🆕 НОВОЕ',tagColor:'#0071e3',title:'Новый слайд'});
  saveBanners(() => { renderBanner(); editBannerSlide(banners.length-1); });
}

function deleteBannerSlide(i) {
  if (banners.length <= 1) { tg.showAlert('Нельзя удалить последний слайд!'); return; }
  banners.splice(i, 1);
  saveBanners(() => { renderBanner(); tg.showAlert('✅ Слайд удалён!'); });
}
renderSubFilters();
filterProducts();
</script>
</body>
</html>
