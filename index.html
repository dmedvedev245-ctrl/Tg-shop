.card-name{font-size:12px;font-weight:600;color:#1d1d1f;margin-bottom:4px;line-height:1.3}

.edit-btn{position:absolute;top:6px;right:6px;background:rgba(0,0,0,0.65);color:#fff;border:none;border-radius:8px;padding:4px 8px;font-size:11px;cursor:pointer;display:none;z-index:10}

    <button class="cat-item" id="cat-gaming" onclick="selectCat('gaming','🎮 Игровые',this)"><span>🎮</span><span>Игровые</span></button>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

const CLOUD_NAME = 'dxzccbrb1';
const UPLOAD_PRESET = 'store457';
const ADMIN_PASSWORD = '457admin';
const BOT_TOKEN = '8442060752:AAF6D_0k7o2rYX3uL7CgyGrE2NfJrCjUcsw';
const MANAGER_ID = '7745794986';

let isAdmin = false;
let editingProductId = null;
let cart = [];
let currentTab = 'phones';
let currentSub = 'all';
let tapCount = 0, tapTimer;

const NPOINT_URL = 'https://api.npoint.io/161616576b21c39fda33';
let customPhotos = {};
fetch(NPOINT_URL).then(r => r.json()).then(data => { Object.assign(customPhotos, data); filterProducts(); }).catch(() => {});

// ===== ADMIN =====
document.getElementById('headerTitle').addEventListener('click', () => {
  tapCount++;
  clearTimeout(tapTimer);
  tapTimer = setTimeout(() => tapCount = 0, 1000);
  if (tapCount >= 3) { tapCount = 0; if (!isAdmin) showAdminLogin(); }
});

function showAdminLogin() {
  const el = document.createElement('div');
  el.className = 'admin-login'; el.id = 'adminLogin';
  el.innerHTML = '<div class="admin-login-box"><h3>🔐 Администратор</h3><input type="password" id="adminPass" placeholder="Пароль"><button class="ok-btn" onclick="checkAdminPass()">Войти</button><button class="cancel-btn" onclick="closeAdminLogin()">Отмена</button></div>';
  document.body.appendChild(el);
  setTimeout(() => document.getElementById('adminPass').focus(), 100);
}
function checkAdminPass() {
  if (document.getElementById('adminPass').value === ADMIN_PASSWORD) {
    isAdmin = true;
    document.body.classList.add('admin-mode');
    document.getElementById('adminBar').classList.add('show');
    closeAdminLogin(); filterProducts();
  } else { alert('Неверный пароль!'); }
}
function closeAdminLogin() { const el = document.getElementById('adminLogin'); if (el) el.remove(); }
function exitAdmin() {
  isAdmin = false;
  document.body.classList.remove('admin-mode');
  document.getElementById('adminBar').classList.remove('show');
  filterProducts();
}
function openUpload(productId) {
  editingProductId = productId;
  const p = allProducts.find(x => x.id === productId);
  const el = document.createElement('div');
  el.className = 'upload-overlay'; el.id = 'uploadOverlay';
el.innerHTML = '<div class="upload-box"><h3>📸 Управление фото</h3><p>' + p.name + '</p><input type="file" id="photoFile" accept="image/*" style="display:none" onchange="uploadPhoto()"><button class="up-btn" onclick="document.getElementById(\'photoFile\').removeAttribute(\'capture\');document.getElementById(\'photoFile\').click()">🖼 Галерея</button><button class="up-btn" style="background:#444;margin-top:6px" onclick="document.getElementById(\'photoFile\').setAttribute(\'capture\',\'environment\');document.getElementById(\'photoFile\').click()">📷 Камера</button>' + (customPhotos[productId] || customPhotos[String(productId)] ? '<button class="up-btn" style="background:#c62828;margin-top:6px" onclick="deletePhoto(' + productId + '); closeUpload()">🗑 Удалить фото</button>' : '') + '<button class="up-cancel" style="margin-top:6px" onclick="closeUpload()">Отмена</button><div class="upload-progress" id="uploadProgress"></div></div>';
  document.body.appendChild(el);
}
function closeUpload() { const el = document.getElementById('uploadOverlay'); if (el) el.remove(); editingProductId = null; }
function deletePhoto(productId) {
  delete customPhotos[productId];
  delete customPhotos[String(productId)];
  fetch(NPOINT_URL, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(customPhotos)}).then(()=>{ closeUpload(); filterProducts(); tg.showAlert('✅ Фото удалено!'); });
}function uploadPhoto() {
  const file = document.getElementById('photoFile').files[0];
  if (!file) { alert('Выберите файл!'); return; }
  document.getElementById('uploadProgress').textContent = '⏳ Загружаю...';
 const fd = new FormData();
  fd.append('file', file);
  fd.append('upload_preset', UPLOAD_PRESET);
  fd.append('public_id', 'store457/product_' + editingProductId);
  fd.append('tags', 'store457');
  fetch('https://api.cloudinary.com/v1_1/' + CLOUD_NAME + '/image/upload', { method: 'POST', body: fd })
      .then(r => r.json()).then(data => {
        if (data.secure_url) {
          customPhotos[editingProductId] = data.secure_url;
          fetch(NPOINT_URL, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(customPhotos)}).then(()=>{
            document.getElementById('uploadProgress').textContent = '✅ Готово!';
            setTimeout(()=>{ closeUpload(); filterProducts(); }, 700);
          });
        } else {
          document.getElementById('uploadProgress').textContent = '❌ Ошибка загрузки';
        }
      }).catch(() => { document.getElementById('uploadProgress').textContent = '❌ Ошибка сети'; });

// ===== CATEGORY MENU =====
function openCatMenu() {
  document.getElementById('catOverlay').classList.add('show');
  document.getElementById('catSheet').classList.add('show');
}
function closeCatMenu() {
  document.getElementById('catOverlay').classList.remove('show');
  document.getElementById('catSheet').classList.remove('show');
}
function selectCat(tab, label, btn) {
  currentTab = tab; currentSub = 'all';
  document.querySelectorAll('.cat-item').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('catLabel').textContent = label;
  document.getElementById('search').value = '';
  closeCatMenu();
  if (tab === 'services') {
    renderServices();
    document.getElementById('subFilters').innerHTML = '';
    document.getElementById('resultsCount').textContent = '';
  } else { renderSubFilters(); filterProducts(); }
}

// ===== SORTING =====
function getModelScore(name) {
  const n = name.toLowerCase();
  if (n.includes('iphone')) {
    const m = n.match(/iphone (\d+)/); if (!m) return 0;
    let base = parseInt(m[1]) * 1000;
    if (n.includes('pro max')) base += 400;
    else if (n.includes('pro')) base += 300;
    else if (n.includes('air')) base += 200;
    else if (n.includes('plus')) base += 100;
    else if (n.includes(' se')) base -= 500;
    return base;
  }
  if (n.includes('fold 7')) return 115000;
  if (n.includes('flip7 fe')) return 111000;
  if (n.includes('flip7')) return 112000;
  if (n.includes('s25 ultra')) return 109000;
  if (n.includes('s25 edge')) return 108000;
  if (n.includes('s25 fe')) return 106000;
  if (n.includes('s25')) return 107000;
  if (n.includes('s24 plus')) return 105000;
  if (n.includes('s24')) return 104000;
  if (n.includes('a56')) return 5600; if (n.includes('a55')) return 5500;
  if (n.includes('a36')) return 3600; if (n.includes('a26')) return 2600; if (n.includes('a17')) return 1700;
  if (n.includes('poco f8 ultra')) return 8800; if (n.includes('poco f8 pro')) return 8700;

  const gb = n.match(/(\d+)\s*gb/); if (gb) return parseInt(gb[1]);

  return 0;
}

// ===== RENDER =====
function getSubsForTab(tab) {
  return [...new Set(allProducts.filter(p => p.tab === tab).map(p => p.sub))];
}
function renderSubFilters() {
  const subs = getSubsForTab(currentTab);
  document.getElementById('subFilters').innerHTML =
    '<button class="sub-btn active" onclick="setSub(\'all\',this)">Все</button>' +
    subs.map(s => '<button class="sub-btn" onclick="setSub(\'' + s + '\',this)">' + s + '</button>').join('');
}
function setSub(sub, btn) {
  currentSub = sub;
  document.querySelectorAll('.sub-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filterProducts();
}
function filterProducts() {
  const q = document.getElementById('search').value.toLowerCase();
  let list;
  if (q) {
    list = allProducts.filter(p => p.name.toLowerCase().includes(q));
  } else {
    list = allProducts.filter(p => p.tab === currentTab && (currentSub === 'all' || p.sub === currentSub));
  }
  list = list.slice().sort((a, b) => {
    const sa = getModelScore(a.name), sb = getModelScore(b.name);
    if (sb !== sa) return sb - sa;
    return getStorageMB(a.name) - getStorageMB(b.name);
  });
  renderProducts(list);
}
function renderProducts(list) {
  document.getElementById('resultsCount').textContent = 'Найдено: ' + list.length + ' товаров';
  document.getElementById('catalog').style.display = 'grid';
  document.getElementById('catalog').innerHTML = list.map(p => {
    const src = getProductImage(p);
    return '<div class="card ' + (p.inStock ? '' : 'out-of-stock') + '">' +
      '<button class="edit-btn" onclick="openUpload(' + p.id + ')">✏️ Фото</button>' +
      '<img class="card-img" src="' + src + '" alt="' + p.name + '" onerror="this.style.display=\'none\'">' +
      '<div class="card-body">' +
      '<div class="card-name">' + p.name + '</div>' +
      '<div class="stock-badge ' + (p.inStock ? 'in-stock' : 'no-stock') + '">' + (p.inStock ? '✓ В наличии' : '✗ Нет') + '</div>' +
      '<button class="add-btn" onclick="addToCart(' + p.id + ')" ' + (p.inStock ? '' : 'disabled') + '>' +
      (p.inStock ? 'Заказать' : 'Нет в наличии') +
      '</button></div></div>';
  }).join('');
}
function renderServices() {
  document.getElementById('catalog').style.display = 'block';
  document.getElementById('catalog').innerHTML = '<div class="services-grid">' +
    services.map(s =>
      '<div class="service-card"><div class="service-info"><div class="service-name">' + s.icon + ' ' + s.name + '</div><div class="service-desc">' + s.desc + '</div></div>' +
      '<button class="service-btn" onclick="orderService(\'' + s.id + '\')">Записаться</button></div>'
    ).join('') + '</div>';
}

// ===== CART =====
function addToCart(id) {
  const p = allProducts.find(x => x.id === id);
  const ex = cart.find(x => x.id === id);
  if (ex) ex.qty++; else cart.push({...p, qty: 1});
  updateCartBar();
}
function updateCartBar() {
  const count = cart.reduce((s, p) => s + p.qty, 0);
  document.getElementById('cartCount').textContent = count;
  document.getElementById('cartBar').classList.toggle('visible', count > 0);
}
function openCart() {
  const user = tg.initDataUnsafe && tg.initDataUnsafe.user;
  const username = user ? (user.username ? '@' + user.username : user.first_name) : 'Неизвестный';
  const userId = user ? user.id : 'N/A';
  const text = cart.map(p => '• ' + p.name + ' x' + p.qty).join('\n');
  tg.showConfirm('Ваш заказ:\n' + text + '\n\nМенеджер свяжется и сообщит цену. Отправить?', function(ok) {
    if (ok) {
      fetch('https://api.telegram.org/bot' + BOT_TOKEN + '/sendMessage', {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({chat_id: MANAGER_ID, text: '🛒 Новый заказ!\n\n👤 ' + username + ' (ID: ' + userId + ')\n\n' + text})
      }).then(() => {
        tg.showAlert('✅ Заказ отправлен! Менеджер свяжется с вами.');
        cart = []; updateCartBar();
      });
    }
  });
}
function orderService(id) {
  const s = services.find(x => x.id === id);
  const user = tg.initDataUnsafe && tg.initDataUnsafe.user;
  const username = user ? (user.username ? '@' + user.username : user.first_name) : 'Неизвестный';
  const userId = user ? user.id : 'N/A';
  tg.showConfirm('Записаться на:\n' + s.name + '\n\nМенеджер свяжется с вами. Подтвердить?', function(ok) {
    if (ok) {
      fetch('https://api.telegram.org/bot' + BOT_TOKEN + '/sendMessage', {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({chat_id: MANAGER_ID, text: '🔧 Запрос на услугу!\n\n👤 ' + username + ' (ID: ' + userId + ')\n📋 ' + s.name})
      }).then(() => { tg.showAlert('✅ Запрос отправлен!'); });
    }
  });
}
